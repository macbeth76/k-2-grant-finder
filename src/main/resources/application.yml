micronaut:
  application:
    name: k2-grant-finder
  server:
    port: 8080

datasources:
  default:
    url: jdbc:h2:mem:grantfinder;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password: ""
    schema-generate: NONE
    dialect: H2

flyway:
  datasources:
    default:
      enabled: true
